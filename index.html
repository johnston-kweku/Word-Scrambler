<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO -->
    <meta name="description" content="Play a free online Word Scrambler game. Unscramble letters, track your accuracy, and improve your vocabulary with this fun word puzzle challenge.">
    <meta name="keywords" content="word scrambler, word game, scramble letters, vocabulary game, online puzzle game">
    <meta property="og:title" content="Word Scrambler Game – Free Online Puzzle">
    <meta property="og:description" content="Unscramble letters, track accuracy, and challenge your brain with this free word puzzle game."> 
    <meta property="og:image" content="https://johnston-kweku.github.io/Word-Scrambler/images/word.png"> 
    <meta property="og:type" content="website">
    <meta name="google-site-verification" content="klIA_hi9iPv0T47CWU1jpMvf4rU63nFfn4mcgJ-IU1c" />
    <!-- SEO -->
    <title>Word Scrambler Game – Free Online Word Puzzle Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="images/word.png" type="image/x-icon">
    <script type="application/ld+json"> { "@context": "https://schema.org", "@type": "Game", "name": "Word Scrambler", "description": "A free online word scramble puzzle game where players unscramble letters to form correct words.", "applicationCategory": "Game", "operatingSystem": "All" } </script>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-11/12 sm:w-6/12 rounded-3xl bg-white shadow-2xl p-6">
        <!-- Title -->

        <header class="mx-auto text-center flex flex-col items-center justify-center h-full gap-2 mb-6">
            <h1 class="text-3xl sm:text-5xl font-bold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                Word Scrambler
            </h1>
            <p class="text-slate-500">
                Unscramble the letters to reveal the word!
            </p>
            <p id="current-category" class="font-bold text-slate-500">

            </p>
            <div class="flex items-center justify-center">
                <button id="category-menu" class="flex gap-2 bg-gradient-to-r from-purple-500 to-pink-500 p-3 rounded-lg">
                    <img  src="images/menu.svg" class="w-6 backdrop-filter:greyscale(100%)" alt="">
                    <p class="font-bold text-white">
                        Change Category
                    </p>
                </button>
            </div>
        </header>
        <!-- Game stats -->

        <main class="flex items-center justify-center mx-auto gap-8">

            <!-- Correct attempts -->

            <div class="bg-blue-100 text-center rounded-lg p-4 sm:w-48">
                <p id="correct" class="text-blue-500 text-3xl">0</p>
                <p class="text-sm text-slate-700">Correct</p>
            </div>

            <!-- Total attempts -->

            <div class="bg-purple-100 text-center rounded-lg p-4 sm:w-48">
                <p id="attempt" class="text-purple-600 text-3xl ">0</p>
                <p class="text-sm text-slate-700">Attempts</p>
            </div>

            <!-- Accuracy -->

             <div class="bg-pink-100 text-center rounded-lg p-4 sm:w-48">
                <p id="accuracy" class="text-pink-700 text-3xl">0</p>
                <p class=" text-sm text-slate-700">Accuracy</p>
             </div>
        </main>

        <!-- Scrambled letters -->

        <div  class=" flex flex-col gap-y-8 items-center justify-center w-full mx-auto bg-gradient-to-r from-purple-500 to-pink-500 text-center rounded-xl p-4 mt-8">
            <div id="scrambled" class="flex flex-wrap gap-3">


            </div>

            <!-- Action buttons -->
            <div class="flex gap-2">
                <!-- Shuffle button -->
                <button id="shuffle-btn" class="flex text-white gap-3 hover:bg-gray-100 hover:text-black transition active:scale-95 rounded-lg px-4 py-2">
                    <img src="images/shuffle.svg" class="w-5 cursor-pointer" alt="Shuffle letters button Icon">
                    <p class="text-sm font-bold">
                        Shuffle Letters
                    </p>
                </button>
                
                <!-- Show word -->
                
                <button id="show-word" class="flex text-white gap-3 hover:bg-gray-100 hover:text-black transition active:scale-95 rounded-lg px-4 py-2">
                    <img src="images/show.svg" class="w-5">
                    <p class="text-sm font-bold">
                        Show Word
                    </p>
                </button>
            </div>
        </div>

        <!-- Answer Input -->
        <div class="flex items-center gap-2 mt-10">
            <input type="text" autocomplete="off"  id="answer" placeholder="Type your answer here..." class="w-[500px] bg-gray-100 rounded-lg border-2 border-gray-200 p-3 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-gray-500">
            <img id="answer-state" src="" class="w-6 absolute ml-[440px]">
            <button id="check-btn" class="bg-gradient-to-r from-purple-500 to-pink-500 flex items-center gap-1 rounded-lg h-14 px-4 active:scale-95 transition">
                <img src="images/tick.svg" class="w-5" id="submit-btn" alt="Submit Icon">
                <p class="text-white font-bold">Check</p>
            </button>
        </div>

        <!-- Skip and Reset -->

        <div class="flex gap-2 mt-4 w-full">
            <!-- Skip -->

            <button id="skip" class="flex gap-3 items-center justify-center w-full border rounded-lg py-3 active:scale-95 transition hover:bg-gray-100">
                <img src="images/skip.svg" class="w-5" id="skip-btn" alt="Skip Icon">
                <p>Skip</p>
            </button>

            <!-- Reset -->

            <button id="reset" class="flex gap-3 items-center justify-center w-full border rounded-lg py-3 active:scale-95 transition hover:bg-gray-100">
                <img src="images/reset.svg" class="w-5" id="reset-btn" alt="Reset Icon">
                <p>Reset</p>
            </button>
        </div>

        <!-- Hint -->
         <div class="mt-6 rounded-lg p-4 text-center">
            <p id="hint" class="text-slate-400">Hint: </p>
         </div>
    </div>


    <script src="javascript/index.js"></script>
</body>
</html>
